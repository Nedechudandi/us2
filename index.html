<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Private Space</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #121212; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 100%; max-width: 450px; height: 90vh; background: #1e1e1e; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        #login-screen { padding: 30px; display: flex; flex-direction: column; justify-content: center; height: 100%; gap: 20px; text-align: center; }
        h2 { color: #ff4757; margin-bottom: 10px; }
        button { padding: 15px; border: none; border-radius: 8px; background: #ff4757; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #ff6b81; }
        .status { font-size: 14px; color: #a4b0be; }
        #chat-screen { display: none; flex-direction: column; height: 100%; position: relative; }
        .chat-header { padding: 15px 20px; background: #2f3542; display: flex; flex-direction: column; align-items: flex-start; border-bottom: 1px solid #3f4451; }
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .call-btns { display: flex; gap: 15px; }
        .call-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; transition: 0.2s; }
        .call-btn:hover { transform: scale(1.2); }
        #typing-status { font-size: 12px; color: #2ed573; margin-top: 2px; height: 15px; font-style: italic; }
        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 15px; font-size: 15px; line-height: 1.4; word-break: break-word; position: relative; display: flex; flex-direction: column; }
        .msg.me { background: #ff4757; color: white; align-self: flex-end; border-bottom-right-radius: 2px; padding-right: 35px; }
        .msg.them { background: #2f3542; color: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; }
        .tick { position: absolute; bottom: 4px; right: 8px; font-size: 12px; color: rgba(255,255,255,0.7); }
        .chat-input-area { padding: 15px; display: flex; gap: 10px; background: #1e1e1e; border-top: 1px solid #2f3542; align-items: center; }
        #msg-input { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #2f3542; color: white; font-size: 16px; outline: none; }
        .image-btn { background: #2f3542; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; }
        #image-input { display: none; }
        
        /* Call Interface Overlay */
        #call-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18,18,18,0.95); z-index: 10; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .video-container { display: flex; flex-direction: column; gap: 10px; width: 90%; max-height: 70%; justify-content: center; align-items: center; }
        video { width: 100%; max-width: 320px; border-radius: 10px; background: #2f3542; transform: scaleX(-1); }
        #remote-video { max-width: 320px; }
        #local-video { max-width: 120px; position: absolute; bottom: 90px; right: 20px; border: 2px solid #ff4757; }
        .call-controls { display: flex; gap: 20px; z-index: 11; }
        .btn-accept { background: #2ed573; padding: 12px 25px; }
        .btn-decline { background: #ff4757; padding: 12px 25px; }
    </style>
</head>
<body>
<div class="container">
    <div id="login-screen">
        <h2>Our Space</h2>
        <p class="status" id="init-status">Access Point Setup</p>
        <button id="btn-host" style="display:none;">I am the Boy</button>
        <button id="btn-join" style="display:none;">I am the Girl</button>
    </div>
    
    <div id="chat-screen">
        <!-- Call Screen Overlay -->
        <div id="call-overlay">
            <h3 id="call-status">Calling...</h3>
            <div class="video-container">
                <video id="remote-video" autoplay playsinline></video>
                <video id="local-video" autoplay playsinline muted></video>
            </div>
            <div class="call-controls">
                <button id="accept-call-btn" class="btn-accept" style="display:none;">Accept</button>
                <button id="end-call-btn" class="btn-decline">End Call</button>
            </div>
        </div>

        <div class="chat-header">
            <div class="header-top">
                <h3 id="chat-with-title">Connected</h3>
                <div class="call-btns">
                    <button class="call-btn" id="audio-call-btn">📞</button>
                    <button class="call-btn" id="video-call-btn">📹</button>
                </div>
            </div>
            <div id="typing-status"></div>
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <label for="image-input" class="image-btn">📷</label>
            <input type="file" id="image-input" accept="image/*">
            <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn" style="padding: 12px 20px;">Send</button>
        </div>
    </div>
</div>

<script>
    const BOY_ID = "vinnu-secure-private-key-10293";  
    const GIRL_ID = "bujjulu-secure-private-key-10293";
    let peer = null; let conn = null; let myRole = ""; let typingTimeout;
    let unreadMessages = []; let localStream = null; let currentCall = null;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playNotificationSound() {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
        osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
        osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.4);
    }

    if (Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
    }

    function showNotification(title, body) {
        if (document.hidden && Notification.permission === "granted") {
            new Notification(title, { body: body, icon: 'https://cdn-icons-png.flaticon.com/512/134/134914.png' });
        }
    }

    const loginScreen = document.getElementById('login-screen');
    const chatScreen = document.getElementById('chat-screen');
    const initStatus = document.getElementById('init-status');
    const btnHost = document.getElementById('btn-host');
    const btnJoin = document.getElementById('btn-join');
    const msgInput = document.getElementById('msg-input');
    const imageInput = document.getElementById('image-input');
    const sendBtn = document.getElementById('send-btn');
    const messagesContainer = document.getElementById('chat-messages');
    const typingStatus = document.getElementById('typing-status');
    
    // Call UI elements
    const callOverlay = document.getElementById('call-overlay');
    const callStatus = document.getElementById('call-status');
    const acceptCallBtn = document.getElementById('accept-call-btn');
    const endCallBtn = document.getElementById('end-call-btn');
    const localVideo = document.getElementById('local-video');
    const remoteVideo = document.getElementById('remote-video');

    btnHost.style.display = "block"; btnJoin.style.display = "block";
    btnHost.addEventListener('click', () => { myRole = "boy"; initPeer(BOY_ID); audioCtx.resume(); });
    btnJoin.addEventListener('click', () => { myRole = "girl"; initPeer(GIRL_ID); audioCtx.resume(); });

    function initPeer(customId) {
        btnHost.style.display = "none"; btnJoin.style.display = "none";
        initStatus.innerText = "Connecting directly...";
        peer = new Peer(customId);
        peer.on('open', (id) => {
            if (myRole === "boy") {
                initStatus.innerText = "Waiting for her gateway connection...";
                peer.on('connection', (incomingConn) => {
                    if (incomingConn.peer === GIRL_ID) { conn = incomingConn; setupChat(); }
                    else { incomingConn.close(); }
                });
            } else {
                initStatus.innerText = "Connecting straight to him...";
                conn = peer.connect(BOY_ID); setupChat();
            }
        });

        // Handle Incoming Calls
        peer.on('call', (call) => {
            currentCall = call;
            callOverlay.style.display = 'flex';
            acceptCallBtn.style.display = 'block';
            callStatus.innerText = "Incoming Call...";
            playNotificationSound();
        });

        peer.on('error', (err) => { alert("Connection error. Try refreshing."); location.reload(); });
    }
    
    function setupChat() {
        conn.on('open', () => {
            loginScreen.style.display = 'none'; chatScreen.style.display = 'flex';
            sendPendingReceipts();
        });
        conn.on('data', (data) => {
            if(data.type === 'text') {
                appendMessage(data.text, 'them', data.msgId);
                playNotificationSound(); showNotification("New Message", data.text);
                if (!document.hidden) conn.send({ type: 'read-receipt', msgId: data.msgId });
                else unreadMessages.push(data.msgId);
            } else if(data.type === 'image') {
                appendImage(data.imageSrc, 'them', data.msgId);
                playNotificationSound(); showNotification("New Message", "Sent you a picture 📷");
                if (!document.hidden) conn.send({ type: 'read-receipt', msgId: data.msgId });
                else unreadMessages.push(data.msgId);
            } else if(data.type === 'typing') {
                typingStatus.innerText = "typing...";
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => { typingStatus.innerText = ""; }, 1500);
            } else if(data.type === 'read-receipt') {
                const targetTick = document.getElementById('tick-' + data.msgId);
                if(targetTick) targetTick.innerText = "✓✓";
            }
        });
        conn.on('close', () => { alert("Session ended safely."); location.reload(); });
    }

    document.addEventListener("visibilitychange", () => { if (!document.hidden) sendPendingReceipts(); });

    function sendPendingReceipts() {
        if (conn && conn.open && unreadMessages.length > 0) {
            unreadMessages.forEach(msgId => { conn.send({ type: 'read-receipt', msgId: msgId }); });
            unreadMessages = [];
        }
    }

    msgInput.addEventListener('input', () => { if(conn && conn.open) conn.send({ type: 'typing' }); });

    function sendMessage() {
        const text = msgInput.value.trim();
        if (text && conn) {
            const msgId = 'msg-' + Date.now();
            conn.send({ type: 'text', text: text, msgId: msgId });
            appendMessage(text, 'me', msgId); msgInput.value = '';
        }
    }

    // Call Feature Logics
    document.getElementById('audio-call-btn').addEventListener('click', () => startCall(false));
    document.getElementById('video-call-btn').addEventListener('click', () => startCall(true));

    function startCall(isVideo) {
        const constraints = { audio: true, video: isVideo };
        navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
            localStream = stream;
            localVideo.srcObject = stream;
            localVideo.style.display = isVideo ? 'block' : 'none';
            callOverlay.style.display = 'flex';
            callStatus.innerText = "Calling...";
            
            const targetId = (myRole === "boy") ? GIRL_ID : BOY_ID;
            const call = peer.call(targetId, stream);
            currentCall = call;
            setupCallHandlers(call);
        }).catch(err => alert("Camera/Microphone permission required. Ensure site is HTTPS."));
    }

    acceptCallBtn.addEventListener('click', () => {
        acceptCallBtn.style.display = 'none';
        const isVideo = currentCall.options.constraints ? !!currentCall.options.constraints.video : true;
        navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo }).then((stream) => {
            localStream = stream;
            localVideo.srcObject = stream;
            localVideo.style.display = isVideo ? 'block' : 'none';
            currentCall.answer(stream);
            setupCallHandlers(currentCall);
        }).catch(err => { alert("Failed to get audio/video streams."); endCall(); });
    });

    endCallBtn.addEventListener('click', endCall);

    function setupCallHandlers(call) {
        callStatus.innerText = "On Call";
        call.on('stream', (remoteStream) => { remoteVideo.srcObject = remoteStream; });
        call.on('close', () => { endCall(); });
    }

    function endCall() {
        callOverlay.style.display = 'none';
        if (currentCall) { currentCall.close(); currentCall = null; }
        if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
        remoteVideo.srcObject = null; localVideo.srcObject = null;
    }

    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            if (conn) {
                const msgId = 'msg-' + Date.now();
                conn.send({ type: 'image', imageSrc: event.target.result, msgId: msgId });
                appendImage(event.target.result, 'me', msgId);
            }
        };
        reader.readAsDataURL(file); imageInput.value = '';
    });

    function appendMessage(text, sender, msgId) {
        const msgDiv = document.createElement('div'); msgDiv.classList.add('msg', sender);
        msgDiv.innerText = text;
        if(sender === 'me') {
            const tickSpan = document.createElement('span'); tickSpan.classList.add('tick');
            tickSpan.id = 'tick-' + msgId; tickSpan.innerText = "✓"; msgDiv.appendChild(tickSpan);
        }
        messagesContainer.appendChild(msgDiv); messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function appendImage(src, sender, msgId) {
        const msgDiv = document.createElement('div'); msgDiv.classList.add('msg', sender);
        const img = document.createElement('img'); img.src = src; msgDiv.appendChild(img);
        if(sender === 'me') {
            const tickSpan = document.createElement('span'); tickSpan.classList.add('tick');
            tickSpan.id = 'tick-' + msgId; tickSpan.innerText = "✓"; msgDiv.appendChild(tickSpan);
        }
        messagesContainer.appendChild(msgDiv); messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
